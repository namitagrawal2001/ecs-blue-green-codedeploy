name: Deploy to ECS Blue-Green

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: strapi
  CODEDEPLOY_APP: strapi-codedeploy-app
  CODEDEPLOY_GROUP: strapi-deployment-group

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker build -t $IMAGE_URI ./strapi
          docker push $IMAGE_URI

      - name: Update Task Definition Image
        run: |
          sed "s|IMAGE_TAG|${{ github.sha }}|g" taskdef-template.json > taskdef.json

      - name: Register New Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://taskdef.json

      - name: Trigger CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name $CODEDEPLOY_APP \
            --deployment-group-name $CODEDEPLOY_GROUP \
            --revision revisionType=AppSpecContent,appSpecContent={content=$(base64 -w 0 appspec.json)}