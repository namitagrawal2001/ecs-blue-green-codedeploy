name: CD - Deploy

on:
  workflow_run:
    workflows: ["CI - Build and Push"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update Task Definition
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/strapi-ecs:${{ github.sha }}
          sed -i "s|IMAGE_URI|$IMAGE_URI|g" taskdef.json

      - name: Register Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://taskdef.json

      - name: Trigger CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name dev-codedeploy \
            --deployment-group-name dev-dg \
            --revision file://revision.json