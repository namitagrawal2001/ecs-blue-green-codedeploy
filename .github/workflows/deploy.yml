name: Deploy to ECS Blue-Green

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 👇 ADD THIS STEP HERE
      - name: Get Latest Task Definition
        run: |
          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix dev-strapi \
            --sort DESC \
            --region ap-south-1 \
            --query 'taskDefinitionArns[0]' \
            --output text)

          echo "Latest task definition: $TASK_DEF"

          if [ -z "$TASK_DEF" ] || [ "$TASK_DEF" = "None" ]; then
            echo "Task definition not found"
            exit 1
          fi

          echo "TASK_DEF=$TASK_DEF" >> $GITHUB_ENV

      - name: Create revision.json
        run: |
          echo '{
            "revisionType": "AppSpecContent",
            "appSpecContent": {
              "content": "{\"version\":1,\"Resources\":[{\"TargetService\":{\"Type\":\"AWS::ECS::Service\",\"Properties\":{\"TaskDefinition\":\"'$TASK_DEF'\",\"LoadBalancerInfo\":{\"ContainerName\":\"strapi\",\"ContainerPort\":1337}}}}]}"
            }
          }' > revision.json

      - name: Trigger CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name dev-codedeploy \
            --deployment-group-name dev-dg \
            --deployment-config-name CodeDeployDefault.ECSAllAtOnce \
            --revision file://revision.json