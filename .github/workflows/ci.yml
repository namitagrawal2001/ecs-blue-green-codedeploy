name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  terraform-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - run: |
          cd environments/dev
          terraform init -backend=false

      - run: |
          cd environments/dev
          terraform validate